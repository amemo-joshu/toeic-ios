      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TOEIC-700-MASTER-v${{ github.run_number }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.upload_testflight == 'true' || github.event_name == 'push' }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$(ls $RUNNER_TEMP/ipa/*.ipa)" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_KEY_ISSUER" \
            --verbose || \
          xcrun notarytool submit "$(ls $RUNNER_TEMP/ipa/*.ipa)" \
            --key ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_KEY_ISSUER" \
            --wait

      - name: Notify Success
        if: success()
        run: echo "✅ ビルド成功！TestFlightでテスト可能です。"

      - name: Notify Failure
        if: failure()
        run: echo "❌ ビルド失敗。Actionsログを確認してください。"
